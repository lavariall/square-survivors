<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Survivor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg-color: #0f0f13;
            --primary: #00f0ff;
            --primary-dim: rgba(0, 240, 255, 0.3);
            --danger: #ff003c;
            --danger-dim: rgba(255, 0, 60, 0.3);
            --xp-color: #fcee0a;
            --xp-dim: rgba(252, 238, 10, 0.3);
            --text-light: #ffffff;
            --text-muted: #888899;
            --obstacle: #1a1a24;
            --obstacle-border: #2a2a3a;
            --panel-bg: rgba(20, 20, 28, 0.9);
            --panel-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            user-select: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
            display: none;
        }
        
        .hud.active {
            display: block;
        }

        /* HUD Elements */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 300px;
        }

        .bar-container {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.1s linear;
        }

        .hp-fill { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .stamina-fill { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .xp-fill { background: var(--xp-color); box-shadow: 0 0 10px var(--xp-color); }

        .time-panel {
            font-size: 2rem;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            text-align: center;
        }

        .score-panel {
            text-align: right;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .bottom-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: calc(100% - 40px);
        }

        .level-text {
            position: absolute;
            top: -25px;
            left: 0;
            font-weight: bold;
            color: var(--xp-color);
            text-shadow: 0 0 5px var(--xp-color);
        }

        /* Menus */
        .menu-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-dim);
            text-transform: uppercase;
        }

        h2 { color: var(--danger); }
        h2.win-text { color: var(--xp-color); }

        p { color: var(--text-muted); line-height: 1.6; }

        button {
            background: var(--primary-dim);
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
            transform: translateY(-2px);
        }

        /* Level Up Cards */
        .cards-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .upgrade-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--panel-border);
            border-radius: 12px;
            padding: 20px;
            width: 200px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            pointer-events: auto;
        }

        .upgrade-card:hover {
            border-color: var(--primary);
            background: var(--primary-dim);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px var(--primary-dim);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        table.highscores {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            text-align: left;
        }

        table.highscores th, table.highscores td {
            padding: 8px;
            border-bottom: 1px solid var(--panel-border);
        }

        input[type="text"] {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--panel-border);
            color: white;
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 4px;
            outline: none;
            text-align: center;
            margin-top: 10px;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
        }

    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud" class="hud">
        <div class="top-bar">
            <div class="stats">
                <div class="bar-container">
                    <div id="hp-bar" class="bar-fill hp-fill" style="width: 100%;"></div>
                </div>
                <div class="bar-container">
                    <div id="stamina-bar" class="bar-fill stamina-fill" style="width: 100%;"></div>
                </div>
            </div>
            <div id="timer" class="time-panel">10:00</div>
            <div class="score-panel">
                <div id="kills-text">Kills: 0</div>
            </div>
        </div>
        <div class="bottom-bar">
            <div id="level-text" class="level-text">Level 1</div>
            <div class="bar-container" style="height: 10px;">
                <div id="xp-bar" class="bar-fill xp-fill" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="overlay active">
        <div class="menu-panel">
            <h1>Square Survivor</h1>
            <p>Survive for 10 minutes.<br>WASD to Move. Space to Dash.<br>Combat is Automatic.</p>
            <button id="start-btn">Start Game</button>
            <div style="margin-top: 30px;">
                <h3 style="color:var(--text-light)">Top Survivors</h3>
                <table class="highscores" id="main-highscores">
                    <thead><tr><th>Name</th><th>Kills</th><th>Result</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Level Up Menu -->
    <div id="level-up-menu" class="overlay">
        <div style="text-align: center;">
            <h1 style="color: var(--xp-color); text-shadow: 0 0 20px var(--xp-color);">LEVEL UP!</h1>
            <p style="font-size: 1.2rem;">Choose an upgrade:</p>
            <div id="cards-container" class="cards-container">
                <!-- Cards injected via JS -->
            </div>
        </div>
    </div>

    <!-- Game Over Menu -->
    <div id="game-over-menu" class="overlay">
        <div class="menu-panel">
            <h2 id="end-title">YOU DIED</h2>
            <p id="end-stats">Kills: 0<br>Time: 00:00</p>
            <input type="text" id="player-name" placeholder="Enter Name" maxlength="15" autocomplete="off">
            <br>
            <button id="save-score-btn">Save & Restart</button>
        </div>
    </div>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// UI Elements
const uiElements = {
    hud: document.getElementById('hud'),
    mainMenu: document.getElementById('main-menu'),
    levelUpMenu: document.getElementById('level-up-menu'),
    gameOverMenu: document.getElementById('game-over-menu'),
    endTitle: document.getElementById('end-title'),
    endStats: document.getElementById('end-stats'),
    playerName: document.getElementById('player-name'),
    hpBar: document.getElementById('hp-bar'),
    staminaBar: document.getElementById('stamina-bar'),
    xpBar: document.getElementById('xp-bar'),
    timerText: document.getElementById('timer'),
    killsText: document.getElementById('kills-text'),
    levelText: document.getElementById('level-text'),
    cardsContainer: document.getElementById('cards-container'),
    mainHighscores: document.getElementById('main-highscores').querySelector('tbody')
};

// --- GAME CONSTANTS & STATE ---
const GAME_STATE = { MENU: 0, PLAYING: 1, LEVEL_UP: 2, GAME_OVER: 3 };
let currentState = GAME_STATE.MENU;

const MAP_SIZE = 4000;
const TOTAL_TIME = 10 * 60; // 10 minutes in seconds

let viewport = { w: window.innerWidth, h: window.innerHeight, x: 0, y: 0 };
let lastTime = 0;
let timeSurvived = 0;
let frameId = null;

// Input State
const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
let spacePressed = false;

// --- ENTITIES & LISTS ---
let player;
let enemies = [];
let xpOrbs = [];
let obstacles = [];
let effects = []; // Damage numbers, explosions
let damageTexts = [];

// --- ASSETS & COLORS ---
const COLORS = {
    player: '#00f0ff',
    enemy: '#ff003c',
    xp: '#fcee0a',
    obstacle: '#1a1a24',
    obstacleBorder: '#2a2a3a',
    grid: '#15151c'
};

// --- CLASSES ---
class Rect {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
    }
    intersects(other) {
        return this.x < other.x + other.w && this.x + this.w > other.x &&
               this.y < other.y + other.h && this.y + this.h > other.y;
    }
}

class Player {
    constructor() {
        this.size = 24;
        this.reset();
        
        // Upgradable Stats
        this.baseSpeed = 200;
        this.dashCooldownMax = 1.5;
        this.dashCost = 30;
        this.dashDistance = 600;
        
        this.explosionRadius = 150;
        this.explosionDamage = 50;
        this.explosionCooldownMax = 2.0;
        this.explosionKnockback = 300;
        this.pickupRadius = 100;
    }

    reset() {
        this.x = MAP_SIZE / 2;
        this.y = MAP_SIZE / 2;
        this.vx = 0; this.vy = 0;
        this.maxHp = 100; this.hp = 100;
        this.maxStamina = 100; this.stamina = 100;
        this.staminaRegen = 20;
        this.level = 1;
        this.xp = 0;
        this.xpRequired = 10;
        this.kills = 0;
        this.dashCooldown = 0;
        this.explosionTimer = 0;
        this.invulnTimer = 0;
    }

    update(dt) {
        // Input directional vector
        let dx = 0; let dy = 0;
        if (keys.w || keys.ArrowUp) dy -= 1;
        if (keys.s || keys.ArrowDown) dy += 1;
        if (keys.a || keys.ArrowLeft) dx -= 1;
        if (keys.d || keys.ArrowRight) dx += 1;

        // Normalize
        let len = Math.hypot(dx, dy);
        if (len > 0) { dx /= len; dy /= len; }

        // Dash logic
        if (this.dashCooldown > 0) this.dashCooldown -= dt;
        if (spacePressed && this.dashCooldown <= 0 && this.stamina >= this.dashCost) {
            this.stamina -= this.dashCost;
            this.dashCooldown = this.dashCooldownMax;
            let ddx = dx === 0 && dy === 0 ? 1 : dx; // Default right if idle
            let ddy = dx === 0 && dy === 0 ? 0 : dy;
            // Immediate impulse
            this.x += ddx * this.dashDistance * dt * 5; // Simplified dash 
            this.y += ddy * this.dashDistance * dt * 5;
            effects.push(new DashEffect(this.x, this.y, ddx, ddy));
            spacePressed = false; 
        }

        // Movement
        this.x += dx * this.baseSpeed * dt;
        this.y += dy * this.baseSpeed * dt;

        // Map bounds
        this.x = Math.max(this.size/2, Math.min(MAP_SIZE - this.size/2, this.x));
        this.y = Math.max(this.size/2, Math.min(MAP_SIZE - this.size/2, this.y));

        handleCollisions(this);

        // Stamina and timers
        this.stamina = Math.min(this.maxStamina, this.stamina + this.staminaRegen * dt);
        if (this.invulnTimer > 0) this.invulnTimer -= dt;

        // Combat
        this.explosionTimer -= dt;
        if (this.explosionTimer <= 0) {
            this.triggerExplosion();
            this.explosionTimer = this.explosionCooldownMax;
        }
        
        // XP Magnet
        for (let xp of xpOrbs) {
            if (!xp.active) continue;
            let dist = Math.hypot(this.x - xp.x, this.y - xp.y);
            if (dist < this.pickupRadius) {
                // Pull towards player
                let px = (this.x - xp.x) / dist;
                let py = (this.y - xp.y) / dist;
                xp.x += px * 400 * dt;
                xp.y += py * 400 * dt;
                
                // Collect
                if (dist < this.size) {
                    xp.active = false;
                    this.gainXP(xp.value);
                }
            }
        }
    }

    triggerExplosion() {
        effects.push(new Explosion(this.x, this.y, this.explosionRadius));
        
        for (let enemy of enemies) {
            if (!enemy.active) continue;
            let dist = Math.hypot(this.x - enemy.x, this.y - enemy.y);
            if (dist < this.explosionRadius + enemy.size/2) {
                enemy.takeDamage(this.explosionDamage);
                // Knockback
                if (enemy.active) {
                    let kx = (enemy.x - this.x) / dist;
                    let ky = (enemy.y - this.y) / dist;
                    enemy.x += kx * this.explosionKnockback;
                    enemy.y += ky * this.explosionKnockback;
                }
            }
        }
    }

    gainXP(amount) {
        if (currentState !== GAME_STATE.PLAYING) return;
        this.xp += amount;
        if (this.xp >= this.xpRequired) {
            this.xp -= this.xpRequired;
            this.level++;
            this.xpRequired = Math.floor(10 * Math.pow(this.level, 1.5));
            triggerLevelUp();
        }
    }

    takeDamage(amount) {
        if (this.invulnTimer > 0) return;
        this.hp -= amount;
        this.invulnTimer = 0.5;
        damageTexts.push(new DamageText(this.x, this.y - 20, Math.floor(amount), '#ff0000'));
        if (this.hp <= 0) {
            gameOver(false);
        }
    }

    draw(ctx) {
        if (this.invulnTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) return; // Blink
        ctx.fillStyle = COLORS.player;
        ctx.shadowBlur = 15;
        ctx.shadowColor = COLORS.player;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        ctx.shadowBlur = 0;
    }
}

class Enemy {
    constructor() {
        this.active = false;
        this.size = 20;
    }
    spawn(x, y, hp, speed, damage) {
        this.x = x; this.y = y;
        this.hp = hp; this.maxHp = hp;
        this.speed = speed;
        this.damage = damage;
        this.active = true;
        this.knockbackTimer = 0;
    }
    update(dt) {
        if (!this.active) return;
        let dx = player.x - this.x;
        let dy = player.y - this.y;
        let dist = Math.hypot(dx, dy);
        
        if (dist > 0) {
            this.x += (dx / dist) * this.speed * dt;
            this.y += (dy / dist) * this.speed * dt;
        }

        handleCollisions(this);

        // Damage Player
        if (dist < (this.size/2 + player.size/2) * 0.8) {
            player.takeDamage(this.damage);
        }
    }
    takeDamage(amount) {
        this.hp -= amount;
        damageTexts.push(new DamageText(this.x, this.y - 15, Math.floor(amount), '#ffffff'));
        if (this.hp <= 0) {
            this.active = false;
            player.kills++;
            spawnXP(this.x, this.y, 1);
        }
    }
    draw(ctx) {
        if (!this.active) return;
        ctx.fillStyle = COLORS.enemy;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    }
}

class XPOrb {
    constructor() { this.active = false; }
    spawn(x, y, value) {
        this.x = x + (Math.random()-0.5)*20; 
        this.y = y + (Math.random()-0.5)*20; 
        this.value = value;
        this.active = true;
        this.size = 8;
    }
    draw(ctx) {
        if (!this.active) return;
        ctx.fillStyle = COLORS.xp;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2);
        ctx.fill();
    }
}

class Explosion {
    constructor(x, y, maxRadius) {
        this.x = x; this.y = y;
        this.maxRadius = maxRadius;
        this.radius = 10;
        this.life = 0.3;
        this.maxLife = 0.3;
    }
    update(dt) {
        this.life -= dt;
        this.radius = this.maxRadius * (1 - this.life / this.maxLife);
        return this.life > 0;
    }
    draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0, 240, 255, ${this.life / this.maxLife})`;
        ctx.lineWidth = 4;
        ctx.stroke();
    }
}

class DashEffect {
    constructor(x, y, dx, dy) {
        this.x = x; this.y = y;
        this.dx = dx; this.dy = dy;
        this.life = 0.2;
    }
    update(dt) { this.life -= dt; return this.life > 0; }
    draw(ctx) {
        ctx.fillStyle = `rgba(0, 240, 255, ${this.life * 2})`;
        ctx.fillRect(this.x - Math.random()*24, this.y - Math.random()*24, player.size, player.size);
    }
}

class DamageText {
    constructor(x, y, amount, color) {
        this.x = x; this.y = y; this.amount = amount; this.color = color;
        this.life = 0.8;
    }
    update(dt) {
        this.life -= dt;
        this.y -= 20 * dt;
        return this.life > 0;
    }
    draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life;
        ctx.font = 'bold 16px Inter';
        ctx.fillText(this.amount, this.x, this.y);
        ctx.globalAlpha = 1;
    }
}

// --- SYSTEMS ---

function initGame() {
    player = new Player();
    obstacles = [];
    enemies = [];
    xpOrbs = [];
    effects = [];
    damageTexts = [];
    timeSurvived = 0;
    
    // Generate Map Obstacles
    const density = 0.05;
    const tilesLine = Math.floor(MAP_SIZE / 50);
    player.x = MAP_SIZE/2; player.y = MAP_SIZE/2; // Ensure start in center

    for(let i=0; i<tilesLine; i++) {
        for(let j=0; j<tilesLine; j++) {
            // Don't spawn near center
            let tx = i*50 + 25; let ty = j*50 + 25;
            let distToCenter = Math.hypot(tx - player.x, ty - player.y);
            if (distToCenter > 200 && Math.random() < density) {
                let w = 50 + Math.random()*100;
                let h = 50 + Math.random()*100;
                obstacles.push(new Rect(tx - w/2, ty - h/2, w, h));
            }
        }
    }
    viewport.x = player.x - viewport.w / 2;
    viewport.y = player.y - viewport.h / 2;
}

function handleCollisions(entity) {
    let entRect = new Rect(entity.x - entity.size/2, entity.y - entity.size/2, entity.size, entity.size);
    for (let obs of obstacles) {
        if (entRect.intersects(obs)) {
            // Very simple push out
            // Calculate overlap distances
            let diffLeft = (entRect.x + entRect.w) - obs.x;
            let diffRight = (obs.x + obs.w) - entRect.x;
            let diffTop = (entRect.y + entRect.h) - obs.y;
            let diffBot = (obs.y + obs.h) - entRect.y;

            let minDiff = Math.min(diffLeft, diffRight, diffTop, diffBot);
            if (minDiff === diffLeft) entity.x -= diffLeft;
            else if (minDiff === diffRight) entity.x += diffRight;
            else if (minDiff === diffTop) entity.y -= diffTop;
            else if (minDiff === diffBot) entity.y += diffBot;
            
            entRect.x = entity.x - entity.size/2;
            entRect.y = entity.y - entity.size/2;
        }
    }
}

function getEnemy() {
    let e = enemies.find(en => !en.active);
    if (!e) { e = new Enemy(); enemies.push(e); }
    return e;
}

function getXPOrb() {
    let x = xpOrbs.find(o => !o.active);
    if (!x) { x = new XPOrb(); xpOrbs.push(x); }
    return x;
}

function spawnXP(x, y, value) {
    getXPOrb().spawn(x, y, value);
}

function spawnWave() {
    let activeEnemies = enemies.filter(e => e.active).length;
    let targetEnemies = 20 + Math.floor(timeSurvived * 0.5); // Grows over time
    if (activeEnemies > targetEnemies) return;

    // Spawn randomly around camera bounds
    let angle = Math.random() * Math.PI * 2;
    let dist = Math.max(viewport.w, viewport.h)/2 + 100;
    let sx = player.x + Math.cos(angle) * dist;
    let sy = player.y + Math.sin(angle) * dist;

    // Range checks
    sx = Math.max(20, Math.min(MAP_SIZE - 20, sx));
    sy = Math.max(20, Math.min(MAP_SIZE - 20, sy));

    // Scale stats with time
    let hp = 30 + (timeSurvived * 0.3);
    let speed = 80 + Math.random()*40 + (timeSurvived * 0.05);
    let dmg = 10 + (timeSurvived * 0.05);

    getEnemy().spawn(sx, sy, hp, speed, dmg);
}

// --- UPGRADES ---
const UPGRADES = [
    { name: "Blast Core", desc: "Explosion Damage +20%", apply: p => p.explosionDamage *= 1.2 },
    { name: "Wide Area", desc: "Explosion Radius +20%", apply: p => p.explosionRadius *= 1.2 },
    { name: "Forceful", desc: "Explosion Knockback +50%", apply: p => p.explosionKnockback *= 1.5 },
    { name: "Agility", desc: "Dash Cooldown -15%", apply: p => p.dashCooldownMax *= 0.85 },
    { name: "Endurance", desc: "Max HP +20", apply: p => { p.maxHp += 20; p.hp += 20; } },
    { name: "Swiftness", desc: "Move Speed +10%", apply: p => p.baseSpeed *= 1.1 },
    { name: "Magnetism", desc: "Pickup Radius +50%", apply: p => p.pickupRadius *= 1.5 },
    { name: "Overcharge", desc: "Attack Delay -15%", apply: p => p.explosionCooldownMax *= 0.85 }
];

function triggerLevelUp() {
    currentState = GAME_STATE.LEVEL_UP;
    uiElements.levelUpMenu.classList.add('active');
    
    // Pick 3 random unique
    let shuffled = [...UPGRADES].sort(() => 0.5 - Math.random());
    let choices = shuffled.slice(0, 3);
    
    uiElements.cardsContainer.innerHTML = '';
    choices.forEach(upg => {
        let div = document.createElement('div');
        div.className = 'upgrade-card';
        div.innerHTML = `<div class="card-title">${upg.name}</div><div class="card-desc">${upg.desc}</div>`;
        div.onclick = () => {
            upg.apply(player);
            uiElements.levelUpMenu.classList.remove('active');
            currentState = GAME_STATE.PLAYING;
            lastTime = performance.now(); // Reset time to avoid jump
            requestAnimationFrame(gameLoop);
        };
        uiElements.cardsContainer.appendChild(div);
    });
}

// --- HIGHSCORES ---
function getHighscores() {
    let scores = localStorage.getItem('sqsrv_scores');
    return scores ? JSON.parse(scores) : [];
}
function saveHighscore(name, kills, time, won) {
    let scores = getHighscores();
    scores.push({ name: name || "Anonymous", kills: kills, time: time, won });
    scores.sort((a,b) => b.kills - a.kills);
    scores = scores.slice(0, 5); // Keep top 5
    localStorage.setItem('sqsrv_scores', JSON.stringify(scores));
}
function renderMainHighscores() {
    let scores = getHighscores();
    if(scores.length === 0) {
        uiElements.mainHighscores.innerHTML = '<tr><td colspan="3">No records yet!</td></tr>';
        return;
    }
    uiElements.mainHighscores.innerHTML = scores.map(s => 
        `<tr>
            <td>${s.name}</td>
            <td>${s.kills}</td>
            <td style="color: ${s.won ? 'var(--xp-color)' : 'var(--danger)'}">${s.won ? 'VICTORY' : s.time}</td>
        </tr>`
    ).join('');
}


// --- MAIN FLOW ---
function startGame() {
    initGame();
    uiElements.mainMenu.classList.remove('active');
    uiElements.gameOverMenu.classList.remove('active');
    uiElements.hud.classList.add('active');
    currentState = GAME_STATE.PLAYING;
    lastTime = performance.now();
    if (frameId) cancelAnimationFrame(frameId);
    frameId = requestAnimationFrame(gameLoop);
}

function gameOver(won) {
    currentState = GAME_STATE.GAME_OVER;
    uiElements.hud.classList.remove('active');
    uiElements.gameOverMenu.classList.add('active');
    
    let minText = Math.floor(timeSurvived/60);
    let secText = Math.floor(timeSurvived%60).toString().padStart(2, '0');
    let timeStr = `${minText}:${secText}`;
    
    uiElements.endTitle.innerText = won ? "VICTORY!" : "YOU DIED";
    uiElements.endTitle.className = won ? 'win-text' : '';
    uiElements.endStats.innerHTML = `Kills: ${player.kills}<br>Survived: ${timeStr}<br>Level: ${player.level}`;
    uiElements.playerName.value = '';
    
    uiElements.playerName.dataset.won = won; 
    uiElements.playerName.dataset.timeStr = timeStr; 
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('save-score-btn').addEventListener('click', () => {
    let name = uiElements.playerName.value.trim() || 'Anonymous';
    let won = uiElements.playerName.dataset.won === 'true';
    let timeStr = uiElements.playerName.dataset.timeStr;
    saveHighscore(name, player.kills, timeStr, won);
    uiElements.gameOverMenu.classList.remove('active');
    showMainMenu();
});

function showMainMenu() {
    currentState = GAME_STATE.MENU;
    renderMainHighscores();
    uiElements.mainMenu.classList.add('active');
    if (frameId) cancelAnimationFrame(frameId);
    frameId = requestAnimationFrame(menuLoop);
}


// --- ENGINE ---

window.addEventListener('resize', () => {
    viewport.w = window.innerWidth;
    viewport.h = window.innerHeight;
    canvas.width = viewport.w;
    canvas.height = viewport.h;
    if (currentState === GAME_STATE.MENU) render();
});
// Init canvas size
window.dispatchEvent(new Event('resize'));

window.addEventListener('keydown', e => {
    if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
    if (e.code === 'Space') spacePressed = true;
});
window.addEventListener('keyup', e => {
    if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
    if (e.code === 'Space') spacePressed = false;
});

function gameLoop(time) {
    if (currentState !== GAME_STATE.PLAYING) return;
    
    let dt = (time - lastTime) / 1000;
    lastTime = time;
    if (dt > 0.1) dt = 0.1; // Cap dt for lag spikes

    timeSurvived += dt;
    if (timeSurvived >= TOTAL_TIME) {
        gameOver(true);
        return;
    }

    // Updates
    player.update(dt);
    spawnWave();
    for (let e of enemies) e.update(dt);
    
    effects = effects.filter(e => e.update(dt));
    damageTexts = damageTexts.filter(t => t.update(dt));

    // Camera follow (ease to player)
    let targetCx = player.x - viewport.w / 2;
    let targetCy = player.y - viewport.h / 2;
    // Clamp camera
    targetCx = Math.max(0, Math.min(MAP_SIZE - viewport.w, targetCx));
    targetCy = Math.max(0, Math.min(MAP_SIZE - viewport.h, targetCy));
    
    viewport.x += (targetCx - viewport.x) * 10 * dt;
    viewport.y += (targetCy - viewport.y) * 10 * dt;

    updateUI();
    render();

    frameId = requestAnimationFrame(gameLoop);
}

function menuLoop(time) {
    if (currentState === GAME_STATE.MENU) {
        // Just render background
        render();
        frameId = requestAnimationFrame(menuLoop);
    }
}

function updateUI() {
    uiElements.hpBar.style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
    uiElements.staminaBar.style.width = `${Math.max(0, (player.stamina / player.maxStamina) * 100)}%`;
    uiElements.xpBar.style.width = `${(player.xp / player.xpRequired) * 100}%`;
    uiElements.levelText.innerText = `Level ${player.level}`;
    uiElements.killsText.innerText = `Kills: ${player.kills}`;
    
    let rem = Math.max(0, TOTAL_TIME - timeSurvived);
    let min = Math.floor(rem / 60);
    let sec = Math.floor(rem % 60).toString().padStart(2, '0');
    uiElements.timerText.innerText = `${min}:${sec}`;
}

function render() {
    // Clear screen
    ctx.fillStyle = COLORS.grid;
    ctx.fillRect(0, 0, viewport.w, viewport.h);

    if (currentState === GAME_STATE.MENU || !player) {
         return; // Fast path for menu
    }

    ctx.save();
    ctx.translate(-viewport.x, -viewport.y);

    // Grid (pure visual flair, drawn relative to camera)
    ctx.strokeStyle = '#1a1a24';
    ctx.lineWidth = 1;
    let startX = Math.floor(viewport.x / 50) * 50;
    let startY = Math.floor(viewport.y / 50) * 50;
    ctx.beginPath();
    for(let x = startX; x < viewport.x + viewport.w + 50; x+=50) { ctx.moveTo(x, viewport.y); ctx.lineTo(x, viewport.y + viewport.h); }
    for(let y = startY; y < viewport.y + viewport.h + 50; y+=50) { ctx.moveTo(viewport.x, y); ctx.lineTo(viewport.x + viewport.w, y); }
    ctx.stroke();

    // Map bounds
    ctx.strokeStyle = '#ff003c44';
    ctx.lineWidth = 4;
    ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

    // Draw Obstacles
    ctx.fillStyle = COLORS.obstacle;
    ctx.strokeStyle = COLORS.obstacleBorder;
    ctx.lineWidth = 2;
    for (let obs of obstacles) {
        // Culling
        if (obs.x + obs.w > viewport.x && obs.x < viewport.x + viewport.w &&
            obs.y + obs.h > viewport.y && obs.y < viewport.y + viewport.h) {
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
        }
    }

    // Draw XP
    for (let xp of xpOrbs) {
        if (xp.active && xp.x > viewport.x - 10 && xp.x < viewport.x + viewport.w + 10 && xp.y > viewport.y - 10 && xp.y < viewport.y + viewport.h + 10) {
            xp.draw(ctx);
        }
    }

    // Draw Player
    if (player) player.draw(ctx);

    // Draw Enemies
    for (let e of enemies) {
        if (e.active && e.x > viewport.x - e.size && e.x < viewport.x + viewport.w + e.size &&
            e.y > viewport.y - e.size && e.y < viewport.y + viewport.h + e.size) {
            e.draw(ctx);
        }
    }
    
    // Draw Effects
    for (let ef of effects) ef.draw(ctx);
    for (let t of damageTexts) t.draw(ctx);

    ctx.restore();
}

// Initial draw
showMainMenu();

</script>
